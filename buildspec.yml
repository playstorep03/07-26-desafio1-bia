version: 0.2

phases:
  pre_build:
    commands:
      - echo "Fazendo login no ECR"
      - aws --version
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 627657103611.dkr.ecr.us-east-1.amazonaws.com
      - REPOSITORY_URI=627657103611.dkr.ecr.us-east-1.amazonaws.com/bia
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
  build:
    commands:
      - echo "Build iniciado em `date`"
      - docker build --no-cache --build-arg VITE_API_URL=$VITE_API_URL -t $REPOSITORY_URI:$IMAGE_TAG -f bia/Dockerfile bia/
  post_build:
    commands:
      - echo "Finalizando o build da imagem Docker"
      - docker tag $REPOSITORY_URI:$IMAGE_TAG $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      - echo "Build finalizado com sucesso em `date`"
      - printf '[{"name":"bia","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
